version: '3.8'

services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "feedsystem"
      TZ: "Asia/Shanghai"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p123456 --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "123456"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  # backend:
  #   build:
  #     context: .
  #     dockerfile: backend/Dockerfile
  #     target: api
  #   restart: always
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - ./backend/configs/config.docker.yaml:/app/configs/config.yaml:ro
  #     - backend_uploads:/app/.run/uploads
  #   depends_on:
  #     mysql:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     rabbitmq:
  #       condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: worker
    restart: always
    volumes:
      - ./backend/configs/config.docker.yaml:/app/configs/config.yaml:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # frontend:
  #   build:
  #     context: .
  #     dockerfile: frontend/Dockerfile
  #   restart: always
  #   ports:
  #     - "5173:80"
  #   depends_on:
  #     - backend
    
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
  whisper:
    image: fedirz/faster-whisper-server:latest-cuda # 如果没显卡用 latest-cpu
    container_name: whisper
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - whisper_models:/root/.cache/huggingface # 某些镜像模型存放在此
    environment:
      - WHISPER_MODEL=base # 默认模型，可选 tiny, small, medium, large-v3
      - AS_SERVICE=True
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"  # HTTP API (RESTful 接口，Qdrant 自带的可视化控制台也用这个)
      - "6334:6334"  # gRPC API (你的 Go 代码底层依赖的高速通信接口，极其重要)
    volumes:
      - qdrant_data:/qdrant/storage  # Qdrant 官方默认的数据持久化路径
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2 # 使用 8.x 较新版本
    container_name: es-node
    environment:
      - discovery.type=single-node # 单节点运行（本地开发必备）
      - xpack.security.enabled=false # 关闭安全验证（免密登录，仅限本地开发使用！）
      - ES_JAVA_OPTS=-Xms1g -Xmx1g # 限制内存占用为 1GB，防止撑爆电脑内存
    ports:
      - "9200:9200" # 供应用访问的 REST API 端口
      - "9300:9300" # ES 节点间的通信端口
    volumes:
      - es_data:/usr/share/elasticsearch/data # 数据持久化，防止重启后数据丢失

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2 # 版本必须与 ES 保持一致
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200 # 告诉 Kibana ES 在哪里
    ports:
      - "5601:5601" # Kibana 的 Web 访问端口
    depends_on:
      - elasticsearch # 确保 ES 先启动
volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  backend_uploads:
  # --- 新增模型相关数据卷 ---
  ollama_data:        # 持久化 Ollama 下载的 Llama3, DeepSeek 等模型
  whisper_models:     # 存放 Whisper 的权重文件（base, medium, large等）
  huggingface_cache:  # 存放 Embedding 模型的缓存（避免重复下载 HF 模型）
  qdrant_data:
  es_data:

